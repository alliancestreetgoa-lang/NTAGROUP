kind = "web"
previewPath = "/"
title = "NTAGROUP"
version = "1.0.0"
id = "artifacts/ntagroup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22566

[services.development]
run = "pnpm --filter @workspace/ntagroup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ntagroup", "run", "build" ]
publicDir = "artifacts/ntagroup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22566"
BASE_PATH = "/"
